[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/gemini → netlify function
[[redirects]]
  from = "/api/gemini"
  to   = "/.netlify/functions/gemini"
  status = 200

# SPA fallback — all routes go to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
